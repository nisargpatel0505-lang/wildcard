<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#070713">
  <title>WILDCARD — Royal Neon Palace design preview</title>
  <style>
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#050611;color:#fff;font-family:system-ui,sans-serif}
    #game-frame{position:fixed;inset:0;width:100%;height:100%;border:0;background:#050611}
    #loader{position:fixed;inset:0;z-index:10;display:grid;place-items:center;background:radial-gradient(circle at 50% 30%,#2a1252,#050611 58%);transition:opacity .28s}
    #loader.done{opacity:0;pointer-events:none}
    .load-card{width:min(390px,calc(100vw - 32px));padding:24px;border:1px solid rgba(255,211,106,.55);border-radius:24px;background:rgba(13,12,31,.88);box-shadow:0 24px 80px rgba(0,0,0,.55);text-align:center}
    .load-mark{font-size:52px}.load-title{margin:9px 0 4px;color:#ffd36a;font-weight:900;letter-spacing:.08em}.load-copy{color:#c9c3df;font-size:13px;line-height:1.5}
  </style>
</head>
<body>
  <iframe id="game-frame" title="WILDCARD exact 6.9.14 runtime with Royal Neon Palace preview" src="../index.html?designPreview=royal-arcade"></iframe>
  <div id="loader"><div class="load-card"><div class="load-mark">♛</div><div class="load-title">ROYAL NEON PALACE</div><div class="load-copy">Loading the exact branch version of <code>www/index.html</code>, then applying the visual-only theme, table and Sly preview.</div></div></div>
  <script>
  (function(){
    const frame=document.getElementById('game-frame');
    const loader=document.getElementById('loader');
    function inject(doc,tag,attrs){
      const node=doc.createElement(tag);
      Object.entries(attrs).forEach(([k,v])=>node.setAttribute(k,v));
      (doc.head||doc.documentElement).appendChild(node);
      return node;
    }
    frame.addEventListener('load',()=>{
      try{
        const doc=frame.contentDocument;
        inject(doc,'link',{rel:'stylesheet',href:'experiments/royal-arcade.css'});
        inject(doc,'script',{src:'experiments/royal-arcade.js'});
        setTimeout(()=>loader.classList.add('done'),500);
      }catch(err){
        document.querySelector('.load-copy').textContent='The preview could not inject into the game frame: '+err.message;
      }
    });
  })();
  </script>
</body>
</html>
