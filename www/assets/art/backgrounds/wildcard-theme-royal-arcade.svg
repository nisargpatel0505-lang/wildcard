<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Royal Neon Palace arcade casino background</title>
  <desc id="desc">A dark royal casino palace with neon mint, violet and gold arcade lighting, card suit windows, a glowing throne and perspective grid floor.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#09051b"/><stop offset="0.45" stop-color="#180b33"/><stop offset="1" stop-color="#06171b"/></linearGradient>
    <radialGradient id="halo" cx="50%" cy="34%" r="46%"><stop offset="0" stop-color="#5ff7d4" stop-opacity=".24"/><stop offset=".42" stop-color="#a86cff" stop-opacity=".13"/><stop offset="1" stop-color="#06040f" stop-opacity="0"/></radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff0a6"/><stop offset=".32" stop-color="#ffd36a"/><stop offset=".7" stop-color="#c57b28"/><stop offset="1" stop-color="#70401a"/></linearGradient>
    <linearGradient id="royal" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2c1256"/><stop offset=".45" stop-color="#6b2d8d"/><stop offset="1" stop-color="#120924"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7ffff0" stop-opacity=".42"/><stop offset=".55" stop-color="#8c63ff" stop-opacity=".22"/><stop offset="1" stop-color="#160d35" stop-opacity=".75"/></linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c1747" stop-opacity=".1"/><stop offset=".42" stop-color="#17103a" stop-opacity=".62"/><stop offset="1" stop-color="#03050b"/></linearGradient>
    <pattern id="suits" width="180" height="180" patternUnits="userSpaceOnUse"><text x="22" y="64" font-size="42" fill="#5ff7d4" fill-opacity=".11">♠</text><text x="112" y="82" font-size="34" fill="#ff62d8" fill-opacity=".1">♥</text><text x="54" y="150" font-size="38" fill="#ffd36a" fill-opacity=".09">♦</text><text x="142" y="164" font-size="30" fill="#a86cff" fill-opacity=".11">♣</text></pattern>
    <pattern id="floorGrid" width="150" height="90" patternUnits="userSpaceOnUse"><path d="M0 0H150M0 0V90" fill="none" stroke="#5ff7d4" stroke-opacity=".22" stroke-width="2"/><path d="M75 0V90" fill="none" stroke="#ffd36a" stroke-opacity=".1"/></pattern>
    <filter id="glowMint" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="9" result="b"/><feFlood flood-color="#5ff7d4" flood-opacity=".7"/><feComposite in2="b" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowGold" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="8" result="b"/><feFlood flood-color="#ffd36a" flood-opacity=".75"/><feComposite in2="b" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="28"/></filter>
  </defs>
  <rect width="1536" height="1024" fill="url(#sky)"/><rect width="1536" height="1024" fill="url(#halo)"/><rect width="1536" height="1024" fill="url(#suits)"/>
  <ellipse cx="230" cy="310" rx="250" ry="160" fill="#5ff7d4" fill-opacity=".08" filter="url(#soft)"/><ellipse cx="1300" cy="250" rx="280" ry="180" fill="#ff62d8" fill-opacity=".08" filter="url(#soft)"/>
  <g opacity=".45" fill="url(#royal)" stroke="#a86cff" stroke-opacity=".35" stroke-width="3"><path d="M0 380V220h85v-54h70v54h95v160z"/><path d="M1270 380V205h80v-72h56v72h130v175z"/><path d="M245 380V260h75v-60h48v60h85v120z"/><path d="M1065 380V250h72v-82h52v82h85v130z"/></g>
  <g><g transform="translate(72 122)"><rect x="0" y="88" width="116" height="620" rx="26" fill="url(#royal)" stroke="url(#gold)" stroke-width="8"/><rect x="-18" y="55" width="152" height="68" rx="22" fill="url(#gold)"/><rect x="-22" y="684" width="160" height="64" rx="18" fill="url(#gold)"/><path d="M22 140V650M58 140V650M94 140V650" stroke="#fff0a6" stroke-opacity=".15" stroke-width="9"/><text x="58" y="420" text-anchor="middle" font-size="72" fill="#5ff7d4" opacity=".72" filter="url(#glowMint)">♠</text></g><g transform="translate(1348 122)"><rect x="0" y="88" width="116" height="620" rx="26" fill="url(#royal)" stroke="url(#gold)" stroke-width="8"/><rect x="-18" y="55" width="152" height="68" rx="22" fill="url(#gold)"/><rect x="-22" y="684" width="160" height="64" rx="18" fill="url(#gold)"/><path d="M22 140V650M58 140V650M94 140V650" stroke="#fff0a6" stroke-opacity=".15" stroke-width="9"/><text x="58" y="420" text-anchor="middle" font-size="72" fill="#ff62d8" opacity=".72">♥</text></g></g>
  <path d="M330 515V264Q330 92 768 92T1206 264V515H1125V286Q1125 167 768 167T411 286V515Z" fill="url(#royal)" stroke="url(#gold)" stroke-width="12"/><path d="M390 500V292Q390 146 768 146T1146 292V500" fill="none" stroke="#5ff7d4" stroke-opacity=".52" stroke-width="5" filter="url(#glowMint)"/><path d="M550 180L612 118L676 179L768 78L860 179L924 118L986 180" fill="url(#gold)" stroke="#fff0a6" stroke-width="5" filter="url(#glowGold)"/><circle cx="768" cy="214" r="48" fill="#160d35" stroke="#ffd36a" stroke-width="7"/><text x="768" y="236" text-anchor="middle" font-size="68" fill="#5ff7d4" filter="url(#glowMint)">♛</text>
  <g stroke="url(#gold)" stroke-width="8" fill="url(#glass)"><path d="M242 590V390Q242 285 355 285T468 390V590Z"/><path d="M1068 590V390Q1068 285 1181 285T1294 390V590Z"/></g><g font-size="84" text-anchor="middle" filter="url(#glowMint)"><text x="355" y="472" fill="#5ff7d4">♣</text><text x="1181" y="472" fill="#ff62d8">♦</text></g><path d="M355 295V584M250 440H460M1181 295V584M1076 440H1286" stroke="#fff0a6" stroke-opacity=".24" stroke-width="5"/>
  <g transform="translate(578 410)"><path d="M52 350L20 130H83L105 54H160L190 0L220 54H275L297 130H360L328 350Z" fill="url(#royal)" stroke="url(#gold)" stroke-width="10"/><path d="M104 318V150Q104 97 190 97T276 150V318Z" fill="#1a0d33" stroke="#5ff7d4" stroke-width="6"/><path d="M128 292V178Q128 134 190 134T252 178V292Z" fill="#6f2f83"/><text x="190" y="224" text-anchor="middle" font-size="92" fill="#ffd36a" filter="url(#glowGold)">♠</text><rect x="68" y="318" width="244" height="45" rx="14" fill="url(#gold)"/></g>
  <g transform="translate(235 568)"><path d="M0 286V26Q0 0 28 0H172Q200 0 200 26V286Z" fill="#210d3f" stroke="url(#gold)" stroke-width="7"/><rect x="24" y="36" width="152" height="122" rx="18" fill="#071923" stroke="#5ff7d4" stroke-width="5"/><path d="M45 122L78 78L105 112L142 62L165 120" fill="none" stroke="#ff62d8" stroke-width="6" filter="url(#glowMint)"/><circle cx="72" cy="205" r="12" fill="#ff62d8"/><circle cx="113" cy="205" r="12" fill="#ffd36a"/><rect x="42" y="238" width="116" height="22" rx="11" fill="#5ff7d4" fill-opacity=".26"/></g>
  <g transform="translate(1101 568)"><path d="M0 286V26Q0 0 28 0H172Q200 0 200 26V286Z" fill="#210d3f" stroke="url(#gold)" stroke-width="7"/><rect x="24" y="36" width="152" height="122" rx="18" fill="#071923" stroke="#ff62d8" stroke-width="5"/><circle cx="100" cy="96" r="42" fill="none" stroke="#5ff7d4" stroke-width="7"/><path d="M100 54V138M58 96H142" stroke="#ffd36a" stroke-width="6"/><circle cx="72" cy="205" r="12" fill="#5ff7d4"/><circle cx="113" cy="205" r="12" fill="#ffd36a"/><rect x="42" y="238" width="116" height="22" rx="11" fill="#a86cff" fill-opacity=".3"/></g>
  <path d="M0 715H1536V1024H0Z" fill="url(#floor)"/><path d="M0 730H1536V1024H0Z" fill="url(#floorGrid)" opacity=".82"/><g stroke="#ffd36a" stroke-opacity=".17" stroke-width="3"><path d="M768 710L270 1024"/><path d="M768 710L500 1024"/><path d="M768 710L650 1024"/><path d="M768 710L886 1024"/><path d="M768 710L1036 1024"/><path d="M768 710L1266 1024"/></g><ellipse cx="768" cy="790" rx="390" ry="70" fill="#5ff7d4" fill-opacity=".09" filter="url(#soft)"/><rect width="1536" height="1024" fill="none" stroke="#020208" stroke-width="90" stroke-opacity=".48"/>
</svg>
