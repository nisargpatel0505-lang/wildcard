apply plugin: 'com.android.application'

def ownedAdmobAppId = 'ca-app-pub-3855192091371080~7622357185'
def productionAdmobAppId = (findProperty('WILDCARD_ADMOB_APP_ID') ?: ownedAdmobAppId).toString().trim()
def ownedRewardedAdId = 'ca-app-pub-3855192091371080/3551964243'
def ownedInterstitialAdId = 'ca-app-pub-3855192091371080/2034300223'
def productionRewardedAdId = (findProperty('WILDCARD_ADMOB_REWARDED_ID') ?: ownedRewardedAdId).toString().trim()
def productionInterstitialAdId = (findProperty('WILDCARD_ADMOB_INTERSTITIAL_ID') ?: ownedInterstitialAdId).toString().trim()
def validAdmobAppId = productionAdmobAppId ==~ /ca-app-pub-\d{16}~\d{10}/
def validAdmobUnitId = { value -> value ==~ /ca-app-pub-\d{16}\/\d{10}/ }
def productionAdsReady = validAdmobAppId &&
    validAdmobUnitId(productionRewardedAdId) &&
    validAdmobUnitId(productionInterstitialAdId)
def javaStringLiteral = { value -> '"' + value.replace('\\', '\\\\').replace('"', '\\"') + '"' }
def googleDemoAdmobAppId = 'ca-app-pub-3940256099942544~3347511713'
def googleDemoRewardedId = 'ca-app-pub-3940256099942544/5224354917'
def googleDemoInterstitialId = 'ca-app-pub-3940256099942544/1033173712'

android {
    namespace = "com.nisarg.wildcard"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        buildConfig = true
    }
    defaultConfig {
        applicationId "com.nisarg.wildcard"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 34
        versionName "6.9.14"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // Debug and any unrecognised variants remain ad-free by default.
        manifestPlaceholders = [wildcardAdmobAppId: googleDemoAdmobAppId]
        buildConfigField "boolean", "WILDCARD_ADS_ENABLED", "false"
        buildConfigField "boolean", "WILDCARD_ADS_TESTING", "false"
        buildConfigField "String", "WILDCARD_REWARDED_AD_ID", '""'
        buildConfigField "String", "WILDCARD_INTERSTITIAL_AD_ID", '""'
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            // Keystore + password generated 2026-07-12; password lives in ../../keystore-password.txt
            // KEEP BOTH SAFE — losing them means you can never update the app on Play.
            storeFile file('../../wildcard-release.keystore')
            storePassword new File("${rootDir}/../keystore-password.txt").text.trim()
            keyAlias 'wildcard'
            keyPassword new File("${rootDir}/../keystore-password.txt").text.trim()
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            // Public releases use the owner-created WILDCARD units. Gradle
            // properties may override them for a future unit rotation.
            manifestPlaceholders = [
                // The owner app ID is safe to ship while units remain disabled.
                // Never put Google's demonstration app ID in a public variant.
                wildcardAdmobAppId: validAdmobAppId ? productionAdmobAppId : ownedAdmobAppId
            ]
            buildConfigField "boolean", "WILDCARD_ADS_ENABLED", productionAdsReady.toString()
            buildConfigField "boolean", "WILDCARD_ADS_TESTING", "false"
            buildConfigField "String", "WILDCARD_REWARDED_AD_ID",
                javaStringLiteral(productionAdsReady ? productionRewardedAdId : '')
            buildConfigField "String", "WILDCARD_INTERSTITIAL_AD_ID",
                javaStringLiteral(productionAdsReady ? productionInterstitialAdId : '')
        }
        developer {
            initWith release
            matchingFallbacks = ['release']
            signingConfig signingConfigs.release
            // Developer APKs deliberately use Google's demonstration units.
            manifestPlaceholders = [wildcardAdmobAppId: googleDemoAdmobAppId]
            buildConfigField "boolean", "WILDCARD_ADS_ENABLED", "true"
            buildConfigField "boolean", "WILDCARD_ADS_TESTING", "true"
            buildConfigField "String", "WILDCARD_REWARDED_AD_ID",
                javaStringLiteral(googleDemoRewardedId)
            buildConfigField "String", "WILDCARD_INTERSTITIAL_AD_ID",
                javaStringLiteral(googleDemoInterstitialId)
        }
    }
}

// Keep the local developer build below the Play release so a later
// Play-installed build can update it in place without risking the phone save.
androidComponents {
    onVariants(selector().withBuildType("developer")) { variant ->
        variant.outputs.each { output ->
            output.versionCode.set(33)
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')

    // Firebase account/cloud save + App Check. The BoM keeps the native
    // Firebase libraries on compatible versions.
    implementation platform('com.google.firebase:firebase-bom:34.15.0')
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-firestore'
    implementation 'com.google.firebase:firebase-functions'
    implementation 'com.google.firebase:firebase-appcheck-playintegrity'

    // Current Sign in with Google flow for Android.
    implementation 'androidx.credentials:credentials:1.3.0'
    implementation 'androidx.credentials:credentials-play-services-auth:1.3.0'
    implementation 'com.google.android.libraries.identity.googleid:googleid:1.1.1'

    // Google Play Games Services v2 (official daily/weekly/all-time board).
    implementation 'com.google.android.gms:play-services-games-v2:21.0.0'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
