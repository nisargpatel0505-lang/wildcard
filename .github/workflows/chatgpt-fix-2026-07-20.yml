name: ChatGPT 5.6 fix validation

on:
  push:
    branches:
      - chatgpt-5.6-fix-2026-07-20
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Apply isolated gameplay patch
        run: npm run apply:chatgpt-fix

      - name: Run focused regression suite
        run: node tools/test-chatgpt-balance-fix.js

      - name: Run requested bot cohorts
        run: node tools/chatgpt-balance-sim.js --runs=100 --cohort=all --assert-fix --output=.tmp/chatgpt-fix-sim.json

      - name: Restore Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > wildcard-release.keystore
          printf '%s' "$ANDROID_KEYSTORE_PASSWORD" > keystore-password.txt

      - name: Build separately signed test APK
        shell: bash
        run: |
          npm run sync:android
          chmod +x android/gradlew
          cd android
          ./gradlew :app:assembleRelease --no-daemon

      - name: Collect isolated artifacts
        shell: bash
        run: |
          mkdir -p .tmp/chatgpt-fix-artifacts
          cp android/app/build/outputs/apk/release/app-release.apk .tmp/chatgpt-fix-artifacts/WILDCARD-chatgpt-5.6-fix-2026-07-20.apk
          cp .tmp/chatgpt-fix-sim.json .tmp/chatgpt-fix-artifacts/
          cp .tmp/chatgpt-fix-sim.md .tmp/chatgpt-fix-artifacts/
          cp docs/release/CHATGPT-5.6-fix-2026-07-20.md .tmp/chatgpt-fix-artifacts/
          cp patches/chatgpt-5.6-fix-2026-07-20.patch .tmp/chatgpt-fix-artifacts/
          sha256sum .tmp/chatgpt-fix-artifacts/WILDCARD-chatgpt-5.6-fix-2026-07-20.apk > .tmp/chatgpt-fix-artifacts/SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: WILDCARD-chatgpt-5.6-fix-2026-07-20
          path: .tmp/chatgpt-fix-artifacts/
          if-no-files-found: error
          retention-days: 30
