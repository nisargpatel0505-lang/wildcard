name: ChatGPT 5.6 fix APK

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "chatgpt-5.6-fix-2026-07-20-reviewed"

permissions:
  contents: read

concurrency:
  group: chatgpt-fix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out isolated branch
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Apply isolated gameplay patch
        run: npm run apply:chatgpt-fix

      - name: Targeted exploit, persistence and modifier regressions
        run: npm run test:chatgpt-fix

      - name: Requested new-player, progression and full-unlock bot cohorts
        run: npm run test:chatgpt-sim

      - name: Sync patched web source into Android
        run: npm run sync:android

      - name: Keep tester isolated from production services
        shell: bash
        run: |
          rm -f android/app/google-services.json
          rm -f wildcard-release.keystore keystore-password.txt
          chmod +x android/gradlew

      - name: Build side-installable tester APK
        id: gradle_build
        continue-on-error: true
        working-directory: android
        shell: bash
        run: |
          set +e
          ./gradlew :app:assembleChatgptfix --no-daemon --stacktrace --console=plain > "$GITHUB_WORKSPACE/gradle-build.log" 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload Gradle failure log
        if: steps.gradle_build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: WILDCARD-ChatGPT-5.6-Fix-Gradle-Failure
          path: gradle-build.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after Gradle failure
        if: steps.gradle_build.outcome == 'failure'
        shell: bash
        run: |
          echo "Gradle build failed with exit code ${{ steps.gradle_build.outputs.exit_code }}" >&2
          exit 1

      - name: Verify package, signature and embedded source
        id: verify_apk
        if: steps.gradle_build.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          exec > >(tee verify-apk.log) 2>&1
          set -euo pipefail

          src="$(find android/app/build/outputs/apk -type f -name '*.apk' | grep '/chatgptfix/' | sort | head -n 1 || true)"
          test -n "$src"
          test -f "$src"
          echo "APK: $src"

          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$sdk_root"
          build_tools="$(find "$sdk_root/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          test -n "$build_tools"
          aapt_bin="$build_tools/aapt"
          apksigner_bin="$build_tools/apksigner"
          test -x "$aapt_bin"
          test -x "$apksigner_bin"
          echo "Build tools: $build_tools"

          badging="$("$aapt_bin" dump badging "$src" | head -n 1)"
          echo "$badging"
          app_id="$(sed -n "s/^package: name='\([^']*\)'.*/\1/p" <<< "$badging")"
          version_name="$(sed -n "s/.* versionName='\([^']*\)'.*/\1/p" <<< "$badging")"
          echo "applicationId=$app_id"
          echo "versionName=$version_name"
          test "$app_id" = "com.nisarg.wildcard.chatgptfix"
          test "$version_name" = "6.9.14-chatgpt-5.6-fix-20260720"

          "$apksigner_bin" verify --verbose "$src"
          embedded_sha="$(unzip -p "$src" assets/public/index.html | sha256sum | awk '{print $1}')"
          echo "embeddedIndexSha256=$embedded_sha"
          test "$embedded_sha" = "5cf29ef723d0f4e4e5035d46af0515e52bdc196858aa044c19d39b0e15c72835"

          mkdir -p dist
          cp "$src" "dist/WILDCARD-ChatGPT-5.6-Fix-2026-07-20.apk"
          sha256sum "dist/WILDCARD-ChatGPT-5.6-Fix-2026-07-20.apk" | tee dist/SHA256SUMS.txt
          {
            echo "applicationId=$app_id"
            echo "versionName=$version_name"
            echo "embeddedIndexSha256=$embedded_sha"
            echo "sourceCommit=${GITHUB_SHA}"
          } > dist/BUILD-INFO.txt
          cp docs/release/chatgpt-5.6-fix-2026-07-20.md dist/
          cp docs/release/chatgpt-5.6-fix-2026-07-20-sim.json dist/
          cp .tmp/chatgpt-fix-sim.json dist/chatgpt-fix-smoke-sim.json

      - name: Upload APK verification failure log
        if: steps.verify_apk.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: WILDCARD-ChatGPT-5.6-Fix-Verification-Failure
          path: verify-apk.log
          if-no-files-found: error
          retention-days: 7

      - name: Stop after APK verification failure
        if: steps.verify_apk.outcome == 'failure'
        shell: bash
        run: |
          echo "APK verification failed; see the verification artifact." >&2
          exit 1

      - name: Upload isolated APK
        if: steps.verify_apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: WILDCARD-ChatGPT-5.6-Fix-2026-07-20
          path: dist/
          if-no-files-found: error
          retention-days: 90
