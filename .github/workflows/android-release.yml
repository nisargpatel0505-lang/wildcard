name: Android release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - name: Restore Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > wildcard-release.keystore
          printf '%s' "$ANDROID_KEYSTORE_PASSWORD" > keystore-password.txt
      - run: npm run sync:android
      - run: chmod +x android/gradlew && cd android && ./gradlew :app:assembleRelease :app:bundleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: WILDCARD-Android-release
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
